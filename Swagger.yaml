openapi: 3.0.0
info:
  title: ArtemisIQ ClimateScore API
  version: 1.0.0
  description: >
    A RESTful API that collects, retrieves, preprocesses, and scores climate and
    economic data to produce a composite liveability score (0–100) for countries worldwide.

    Sources:
      - World Bank Open Data: GDP (USD), GDP growth (annual %), exports (% of GDP), imports (% of GDP)
      - Numbeo: Quality of Life Index, Climate Index, Cost of Living Index, Health Care Index
      - Open-Meteo: Mean Temperature, Relative Humidity, Precipitation, Wind Speed, UV Index

    Score breakdown:
      - Comfort index: temperature score (60%) + humidity score (40%)
      - Liveability: comfort index (40%) + UV score (20%) + precipitation score (20%) + wind score (20%)
      - Seasonal scores are computed per hemisphere (spring/summer/autumn/winter)
      - Monthly averages are computed for all five climate variables

    Processed data is stored in AWS S3 and served via read-only GET endpoints.
    Built by team ArtemisIQ for SENG3011.
  contact:
    name: ArtemisIQ
    email: z5583126@ad.unsw.edu.au
  license:
    name: ArtemisIQ

servers:
  # Added by API Auto Mocking Plugin
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/HuzaifaYousufy/F14A_BRAVO_Swagger/1.0.0
  - url: https://api.climatescore.dev/v1
    description: Production (Vercel)
  - url: https://dev.climatescore.dev/v1
    description: Development (Vercel Preview)
  - url: http://localhost:5005
    description: Local development

tags:
  - name: Data Collection
    description: Trigger ingestion from World Bank, Numbeo, and Open-Meteo into MongoDB
  - name: Data Retrieval
    description: Query raw records stored in MongoDB
  - name: Preprocessing - Normalisation
    description: Normalise raw data and compute per-source component scores
  - name: Processing
    description: Ingest and process raw Open-Meteo climate data into liveability scores (S3 pipeline)
  - name: Scores
    description: Retrieve liveability scores, comparisons, rankings, seasonal and monthly breakdowns
  - name: Health
    description: Service health check

security: []

# ─────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────

paths:

  # ─────────────────────────────────────────
  # DATA COLLECTION (phantom — planned)
  # ─────────────────────────────────────────

  /collect/worldbank:
    post:
      tags: [Data Collection]
      summary: Collect World Bank economic indicators for a country
      description: >
        Triggers ingestion of World Bank economic indicator data (GDP, GDP growth,
        exports, imports) for a given country into MongoDB. Optionally scoped to a
        year range.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country_code]
              properties:
                country_code:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  example: AUS
                start_year:
                  type: integer
                  example: 2015
                end_year:
                  type: integer
                  example: 2024
      responses:
        "200":
          description: World Bank data collected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectResponse"
        "400":
          description: Invalid country_code or year range
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collect/numbeo:
    post:
      tags: [Data Collection]
      summary: Collect Numbeo index data for a city
      description: >
        Triggers ingestion of Numbeo index data (Quality of Life, Climate, Cost of
        Living, Health Care) for a given city into MongoDB.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city, country]
              properties:
                city:
                  type: string
                  example: Sydney
                country:
                  type: string
                  example: Australia
      responses:
        "200":
          description: Numbeo data collected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectResponse"
        "400":
          description: Missing city or country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /collect/climate:
    post:
      tags: [Data Collection]
      summary: Collect Open-Meteo climate data for a location
      description: >
        Triggers ingestion of Open-Meteo daily climate records (mean temperature,
        relative humidity, precipitation, wind speed, UV index) for a given
        lat/lon into MongoDB. Optionally scoped to a date range.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lat, lon]
              properties:
                lat:
                  type: number
                  format: float
                  example: -33.8688
                lon:
                  type: number
                  format: float
                  example: 151.2093
                start_date:
                  type: string
                  format: date
                  example: "2024-01-01"
                end_date:
                  type: string
                  format: date
                  example: "2024-12-31"
      responses:
        "200":
          description: Climate data collected successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectResponse"
        "400":
          description: Invalid coordinates or date format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────
  # DATA RETRIEVAL (phantom — planned)
  # ─────────────────────────────────────────

  /worldbank:
    get:
      tags: [Data Retrieval]
      summary: Retrieve World Bank records from MongoDB
      description: >
        Returns stored World Bank economic indicator records for a given country,
        optionally filtered by year range or a single indicator.
      security: []
      parameters:
        - $ref: "#/components/parameters/CountryCodeParam"
        - name: start_year
          in: query
          required: false
          schema:
            type: integer
          example: 2015
        - name: end_year
          in: query
          required: false
          schema:
            type: integer
          example: 2024
        - name: indicator
          in: query
          required: false
          description: Return a single indicator only
          schema:
            type: string
            enum: [gdp_usd, gdp_growth_annual_pct, exports_pct_gdp, imports_pct_gdp]
      responses:
        "200":
          description: Records retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  country:
                    type: object
                    properties:
                      code:
                        type: string
                        example: AUS
                      name:
                        type: string
                        example: Australia
                  totalRecords:
                    type: integer
                    example: 10
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/WorldBankRecord"
        "400":
          description: Invalid country_code or year format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No World Bank data collected for this country yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /numbeo:
    get:
      tags: [Data Retrieval]
      summary: Retrieve Numbeo index records from MongoDB
      description: >
        Returns stored Numbeo index records (Quality of Life, Climate, Cost of Living,
        Health Care) for a given city, optionally filtered by year.
      security: []
      parameters:
        - $ref: "#/components/parameters/CityParam"
        - $ref: "#/components/parameters/CountryParam"
        - name: year
          in: query
          required: false
          schema:
            type: integer
          example: 2025
      responses:
        "200":
          description: Records retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  location:
                    type: object
                    properties:
                      city:
                        type: string
                        example: Sydney
                      country:
                        type: string
                        example: Australia
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/NumbeoRecord"
        "400":
          description: Missing city or country
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No Numbeo data collected for this city yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /climate:
    get:
      tags: [Data Retrieval]
      summary: Retrieve Open-Meteo climate records from MongoDB
      description: >
        Returns stored Open-Meteo daily climate records (mean temperature, relative
        humidity, precipitation, wind speed, UV index) for a given location, with
        optional date range filtering and pagination.
      security: []
      parameters:
        - $ref: "#/components/parameters/LatParam"
        - $ref: "#/components/parameters/LonParam"
        - $ref: "#/components/parameters/StartDateParam"
        - $ref: "#/components/parameters/EndDateParam"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Records retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  location:
                    type: object
                    properties:
                      lat:
                        type: number
                        example: -33.8688
                      lon:
                        type: number
                        example: 151.2093
                  totalRecords:
                    type: integer
                    example: 365
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClimateRecord"
        "400":
          description: Invalid coordinates or date format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No climate data collected for this location yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /locations/summary:
    get:
      tags: [Data Retrieval]
      summary: Retrieve combined data availability snapshot
      description: >
        Returns an availability snapshot across all three sources (World Bank, Numbeo,
        Open-Meteo) for a given location. Use this to confirm what has been collected
        before running the processing pipeline.
      security: []
      parameters:
        - $ref: "#/components/parameters/CityParam"
        - $ref: "#/components/parameters/CountryParam"
        - $ref: "#/components/parameters/CountryCodeParam"
        - $ref: "#/components/parameters/LatParam"
        - $ref: "#/components/parameters/LonParam"
      responses:
        "200":
          description: Location summary retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  location:
                    type: object
                    properties:
                      city:
                        type: string
                        example: Sydney
                      country:
                        type: string
                        example: Australia
                      lat:
                        type: number
                        example: -33.8688
                      lon:
                        type: number
                        example: 151.2093
                  worldBank:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      latestYear:
                        type: integer
                        example: 2024
                      indicatorsCollected:
                        type: integer
                        example: 4
                  numbeo:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      latestYear:
                        type: integer
                        example: 2025
                      indicesCollected:
                        type: integer
                        example: 4
                  climate:
                    type: object
                    properties:
                      available:
                        type: boolean
                        example: true
                      latestDate:
                        type: string
                        format: date
                        example: "2025-12-31"
                      recordsCollected:
                        type: integer
                        example: 365
        "400":
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No data collected for this location across any source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────
  # PREPROCESSING — NORMALISATION (phantom — planned)
  # ─────────────────────────────────────────

  /process/normalise:
    post:
      tags: [Preprocessing - Normalisation]
      summary: Normalise raw records from all three sources
      description: >
        Normalises raw MongoDB records from World Bank, Numbeo, and Open-Meteo for a
        given location. Handles missing values using the selected strategy, standardises
        all values to a common 0–100 scale, and removes statistical outliers.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country_code]
              properties:
                country_code:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  example: AUS
                city:
                  type: string
                  example: Sydney
                country:
                  type: string
                  example: Australia
                lat:
                  type: number
                  format: float
                  example: -33.8688
                lon:
                  type: number
                  format: float
                  example: 151.2093
                strategy:
                  type: string
                  enum: [interpolate, drop, mean_fill]
                  default: interpolate
                  description: Strategy for handling missing values
                sources:
                  type: array
                  description: Limit normalisation to specific sources. Defaults to all three.
                  items:
                    type: string
                    enum: [worldbank, numbeo, open-meteo]
                  default: [worldbank, numbeo, open-meteo]
      responses:
        "200":
          description: Data normalised successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  country_code:
                    type: string
                    example: AUS
                  strategy:
                    type: string
                    example: interpolate
                  results:
                    type: object
                    properties:
                      worldBank:
                        type: object
                        properties:
                          recordsProcessed:
                            type: integer
                            example: 10
                          missingValuesHandled:
                            type: integer
                            example: 1
                          outliersRemoved:
                            type: integer
                            example: 0
                      numbeo:
                        type: object
                        properties:
                          recordsProcessed:
                            type: integer
                            example: 1
                          missingValuesHandled:
                            type: integer
                            example: 0
                          outliersRemoved:
                            type: integer
                            example: 0
                      climate:
                        type: object
                        properties:
                          recordsProcessed:
                            type: integer
                            example: 365
                          missingValuesHandled:
                            type: integer
                            example: 3
                          outliersRemoved:
                            type: integer
                            example: 2
                  processedAt:
                    type: string
                    format: date-time
                    example: "2026-03-01T10:20:00Z"
        "400":
          description: Invalid strategy value or missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No raw data available for one or more sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /process/economic-score:
    post:
      tags: [Preprocessing - Normalisation]
      summary: Derive normalised economic component score from World Bank data
      description: >
        Derives a normalised economic component score (0–100) from stored World Bank
        indicators for a given country.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [country_code]
              properties:
                country_code:
                  type: string
                  pattern: "^[A-Z]{3}$"
                  example: AUS
                year:
                  type: integer
                  description: Year to compute score for. Defaults to most recent available.
                  example: 2024
      responses:
        "200":
          description: Economic score computed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  country_code:
                    type: string
                    example: AUS
                  year:
                    type: integer
                    example: 2024
                  economicScore:
                    type: object
                    properties:
                      overall:
                        type: number
                        example: 73.5
                      breakdown:
                        type: object
                        properties:
                          gdp_usd:
                            type: number
                            example: 80.1
                          gdp_growth_annual_pct:
                            type: number
                            example: 55.2
                          exports_pct_gdp:
                            type: number
                            example: 72.4
                          imports_pct_gdp:
                            type: number
                            example: 69.8
                  computedAt:
                    type: string
                    format: date-time
                    example: "2026-03-01T10:25:00Z"
        "400":
          description: Invalid country_code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No normalised World Bank data available — run /process/normalise first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /process/liveability-factors:
    post:
      tags: [Preprocessing - Normalisation]
      summary: Compute liveability factor scores from Numbeo and Open-Meteo data
      description: >
        Computes individual factor scores (0–100) for each Numbeo index and each
        Open-Meteo variable. Requires /process/normalise to have been run first.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [city, country, lat, lon]
              properties:
                city:
                  type: string
                  example: Sydney
                country:
                  type: string
                  example: Australia
                lat:
                  type: number
                  format: float
                  example: -33.8688
                lon:
                  type: number
                  format: float
                  example: 151.2093
      responses:
        "200":
          description: Liveability factors computed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  location:
                    type: object
                    properties:
                      city:
                        type: string
                        example: Sydney
                      country:
                        type: string
                        example: Australia
                  factors:
                    type: object
                    properties:
                      quality_of_life_index:
                        type: number
                        example: 86.2
                      climate_index:
                        type: number
                        example: 90.1
                      cost_of_living_index:
                        type: number
                        example: 52.4
                      health_care_index:
                        type: number
                        example: 71.8
                      mean_temperature:
                        type: number
                        example: 74.3
                      relative_humidity:
                        type: number
                        example: 65.4
                      precipitation:
                        type: number
                        example: 70.1
                      uv_index:
                        type: number
                        example: 52.0
                  computedAt:
                    type: string
                    format: date-time
                    example: "2026-03-01T10:30:00Z"
        "400":
          description: Missing required parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Normalised data not available — run /process/normalise first
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────
  # PROCESSING — S3 PIPELINE (implemented)
  # ─────────────────────────────────────────

  /process:
    post:
      tags: [Processing]
      summary: Process raw Open-Meteo climate data for a country
      description: >
        Accepts raw Open-Meteo daily climate data for a country, normalises it
        (IQR-based outlier removal), computes an overall liveability score,
        per-season scores (hemisphere-aware), and monthly averages for all five
        climate variables. Stores the result to S3 at processed/{country_code}.json.

        Must be called before any /score endpoints will return data for a given country_code.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessRequest"
            example:
              country: Australia
              country_code: AUS
              capital: Canberra
              latitude: -35.2835
              longitude: 149.1281
              daily:
                time: ["2024-01-01", "2024-01-02"]
                temperature_2m_mean: [22.1, 23.5]
                relative_humidity_2m_mean: [55.0, 58.2]
                precipitation_sum: [0.0, 1.2]
                wind_speed_10m_max: [12.0, 14.5]
                uv_index_max: [6.1, 7.0]
      responses:
        "200":
          description: Location processed and stored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessResponse"
              example:
                country_code: AUS
                liveability: 76.4
                comfort_index: 81.2
                uv_risk: high
                uv_index_mean: 6.5
                temperature_mean: 22.8
                humidity_mean: 56.6
                precipitation_mean: 0.6
                wind_speed_mean: 13.3
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────
  # SCORES (implemented)
  # ─────────────────────────────────────────

  /score:
    get:
      tags: [Scores]
      summary: Get composite liveability score for a country
      description: >
        Returns the composite liveability score and all climate metrics for a given
        country_code. Reads from S3 — requires /process to have been called first.
      security: []
      parameters:
        - $ref: "#/components/parameters/CountryCodeParam"
      responses:
        "200":
          description: Score retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScoreResponse"
              example:
                country_code: AUS
                country: Australia
                capital: Canberra
                latitude: -35.2835
                longitude: 149.1281
                processed_at: "2026-03-01T10:00:00.000Z"
                liveability: 76.4
                comfort_index: 81.2
                uv_risk: high
                uv_index_mean: 6.5
                temperature_mean: 22.8
                humidity_mean: 56.6
                precipitation_mean: 0.6
                wind_speed_mean: 13.3
        "400":
          description: Missing or invalid country_code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /score/compare:
    get:
      tags: [Scores]
      summary: Compare liveability scores across multiple countries
      description: >
        Accepts a comma-separated list of ISO 3166-1 alpha-3 country codes and returns
        their liveability scores sorted highest first. Countries with no data return an
        error field instead of a score. Maximum 20 codes per request.
      security: []
      parameters:
        - name: codes
          in: query
          required: true
          description: Comma-separated list of ISO 3166-1 alpha-3 country codes (max 20)
          schema:
            type: string
          example: AUS,NZL,JPN,DEU
      responses:
        "200":
          description: Comparison retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/CompareItem"
              example:
                results:
                  - country_code: NZL
                    country: New Zealand
                    capital: Wellington
                    liveability: 79.1
                    comfort_index: 83.0
                    uv_risk: high
                    uv_index_mean: 5.9
                    temperature_mean: 18.2
                    humidity_mean: 61.0
                    precipitation_mean: 1.8
                    wind_speed_mean: 17.2
                  - country_code: AUS
                    country: Australia
                    capital: Canberra
                    liveability: 76.4
                    comfort_index: 81.2
                    uv_risk: high
                    uv_index_mean: 6.5
                    temperature_mean: 22.8
                    humidity_mean: 56.6
                    precipitation_mean: 0.6
                    wind_speed_mean: 13.3
                  - country_code: JPN
                    error: No data found
        "400":
          description: No codes provided or more than 20 codes supplied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /score/ranking:
    get:
      tags: [Scores]
      summary: Get ranked list of all countries by liveability score
      description: >
        Returns all processed countries sorted by liveability score, highest first.
        Supports optional filtering by score range and geographic bounding box.
        All parameters are optional — omitting all returns the full global ranking.
        If any bounding box parameter is provided, all four must be provided.
      security: []
      parameters:
        - name: min_score
          in: query
          required: false
          description: Minimum liveability score (inclusive)
          schema:
            type: number
            minimum: 0
            maximum: 100
          example: 60
        - name: max_score
          in: query
          required: false
          description: Maximum liveability score (inclusive)
          schema:
            type: number
            minimum: 0
            maximum: 100
          example: 100
        - name: min_lat
          in: query
          required: false
          description: Southern boundary of bounding box (requires all four bounds)
          schema:
            type: number
          example: -45.0
        - name: max_lat
          in: query
          required: false
          description: Northern boundary of bounding box
          schema:
            type: number
          example: -10.0
        - name: min_lon
          in: query
          required: false
          description: Western boundary of bounding box
          schema:
            type: number
          example: 110.0
        - name: max_lon
          in: query
          required: false
          description: Eastern boundary of bounding box
          schema:
            type: number
          example: 155.0
      responses:
        "200":
          description: Rankings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/RankingItem"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /score/seasonal:
    get:
      tags: [Scores]
      summary: Get seasonal liveability scores for a country
      description: >
        Returns liveability scores broken down by season (spring, summer, autumn, winter).
        Seasons are hemisphere-aware — southern hemisphere countries have inverted seasons.
        A season is null if insufficient data exists for that period.
      security: []
      parameters:
        - $ref: "#/components/parameters/CountryCodeParam"
      responses:
        "200":
          description: Seasonal scores retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeasonalResponse"
              example:
                country_code: AUS
                country: Australia
                capital: Canberra
                seasonal:
                  spring:
                    liveability: 80.2
                    comfort_index: 84.1
                    uv_risk: very_high
                    uv_index_mean: 9.2
                    temperature_mean: 19.5
                    humidity_mean: 53.0
                    precipitation_mean: 0.5
                    wind_speed_mean: 14.0
                  summer:
                    liveability: 65.1
                    comfort_index: 70.3
                    uv_risk: extreme
                    uv_index_mean: 12.1
                    temperature_mean: 28.4
                    humidity_mean: 48.2
                    precipitation_mean: 0.3
                    wind_speed_mean: 11.5
                  autumn:
                    liveability: 82.3
                    comfort_index: 86.0
                    uv_risk: high
                    uv_index_mean: 6.0
                    temperature_mean: 18.0
                    humidity_mean: 57.5
                    precipitation_mean: 0.9
                    wind_speed_mean: 13.0
                  winter:
                    liveability: 75.0
                    comfort_index: 78.5
                    uv_risk: moderate
                    uv_index_mean: 3.2
                    temperature_mean: 10.5
                    humidity_mean: 62.0
                    precipitation_mean: 1.2
                    wind_speed_mean: 15.0
        "400":
          description: Missing or invalid country_code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /score/monthly:
    get:
      tags: [Scores]
      summary: Get monthly climate averages for a country
      description: >
        Returns average values for all five climate variables (temperature, humidity,
        precipitation, wind speed, UV index) for each of the 12 calendar months.
        Months with insufficient data return null for that variable.
      security: []
      parameters:
        - $ref: "#/components/parameters/CountryCodeParam"
      responses:
        "200":
          description: Monthly averages retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyResponse"
              example:
                country_code: AUS
                country: Australia
                capital: Canberra
                monthly:
                  - month: Jan
                    temp: 26.1
                    humidity: 48.5
                    precipitation: 0.4
                    wind: 11.2
                    uv: 11.8
                  - month: Jul
                    temp: 9.8
                    humidity: 63.2
                    precipitation: 1.1
                    wind: 15.0
                    uv: 3.1
        "400":
          description: Missing or invalid country_code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ─────────────────────────────────────────
  # HEALTH
  # ─────────────────────────────────────────

  /health:
    get:
      tags: [Health]
      summary: Service health check
      description: Returns the current health status of the API.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    example: 3.0.0
                  uptime:
                    type: number
                    description: Service uptime in seconds
                    example: 86400
        "503":
          description: Service or one or more dependencies are unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ─────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────

components:

  parameters:

    CountryCodeParam:
      name: country_code
      in: query
      required: true
      description: ISO 3166-1 alpha-3 country code (e.g. AUS, NZL, JPN)
      schema:
        type: string
        pattern: "^[A-Z]{3}$"
      example: AUS

    CityParam:
      name: city
      in: query
      required: true
      description: City name
      schema:
        type: string
      example: Sydney

    CountryParam:
      name: country
      in: query
      required: true
      description: Country name
      schema:
        type: string
      example: Australia

    LatParam:
      name: lat
      in: query
      required: true
      description: Latitude coordinate
      schema:
        type: number
        format: float
      example: -33.8688

    LonParam:
      name: lon
      in: query
      required: true
      description: Longitude coordinate
      schema:
        type: number
        format: float
      example: 151.2093

    StartDateParam:
      name: start_date
      in: query
      required: false
      description: Start date filter (inclusive, YYYY-MM-DD)
      schema:
        type: string
        format: date
      example: "2024-01-01"

    EndDateParam:
      name: end_date
      in: query
      required: false
      description: End date filter (inclusive, YYYY-MM-DD)
      schema:
        type: string
        format: date
      example: "2024-12-31"

    LimitParam:
      name: limit
      in: query
      required: false
      description: Maximum number of records to return
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
      example: 100

    OffsetParam:
      name: offset
      in: query
      required: false
      description: Number of records to skip for pagination
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

  schemas:

    # ── Phantom data schemas ──────────────────

    WorldBankRecord:
      type: object
      properties:
        year:
          type: integer
          example: 2024
        gdp_usd:
          type: number
          example: 1723000000000
        gdp_growth_annual_pct:
          type: number
          example: 1.5
        exports_pct_gdp:
          type: number
          example: 26.3
        imports_pct_gdp:
          type: number
          example: 23.1

    NumbeoRecord:
      type: object
      properties:
        year:
          type: integer
          example: 2025
        quality_of_life_index:
          type: number
          example: 186.4
        climate_index:
          type: number
          example: 90.1
        cost_of_living_index:
          type: number
          example: 79.5
        health_care_index:
          type: number
          example: 71.8

    ClimateRecord:
      type: object
      properties:
        date:
          type: string
          format: date
          example: "2024-06-15"
        temperature_2m_mean:
          type: number
          example: 14.2
        relative_humidity_2m_mean:
          type: number
          example: 68.0
        precipitation_sum:
          type: number
          example: 0.0
        wind_speed_10m_max:
          type: number
          example: 18.5
        uv_index_max:
          type: number
          example: 2.8

    CollectResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        recordsCollected:
          type: integer
          example: 10
        collectedAt:
          type: string
          format: date-time
          example: "2026-03-01T09:00:00Z"

    # ── Process request ───────────────────────

    ProcessRequest:
      type: object
      required: [country, country_code, latitude, longitude, daily]
      properties:
        country:
          type: string
          example: Australia
        country_code:
          type: string
          pattern: "^[A-Z]{3}$"
          example: AUS
        capital:
          type: string
          nullable: true
          example: Canberra
        latitude:
          type: number
          format: float
          example: -35.2835
        longitude:
          type: number
          format: float
          example: 149.1281
        daily:
          type: object
          required:
            - time
            - temperature_2m_mean
            - relative_humidity_2m_mean
            - precipitation_sum
            - wind_speed_10m_max
            - uv_index_max
          properties:
            time:
              type: array
              items:
                type: string
                format: date
              example: ["2024-01-01", "2024-01-02"]
            temperature_2m_mean:
              type: array
              items:
                type: number
              description: Daily mean temperature at 2m (°C)
              example: [22.1, 23.5]
            relative_humidity_2m_mean:
              type: array
              items:
                type: number
              description: Daily mean relative humidity at 2m (%)
              example: [55.0, 58.2]
            precipitation_sum:
              type: array
              items:
                type: number
              description: Daily total precipitation (mm)
              example: [0.0, 1.2]
            wind_speed_10m_max:
              type: array
              items:
                type: number
              description: Daily max wind speed at 10m (km/h)
              example: [12.0, 14.5]
            uv_index_max:
              type: array
              items:
                type: number
              description: Daily max UV index
              example: [6.1, 7.0]

    # ── Shared score fields ───────────────────

    ScoreFields:
      type: object
      properties:
        liveability:
          type: number
          minimum: 0
          maximum: 100
          description: Composite liveability score
          example: 76.4
        comfort_index:
          type: number
          minimum: 0
          maximum: 100
          description: Weighted temperature + humidity comfort score
          example: 81.2
        uv_risk:
          type: string
          nullable: true
          enum: [low, moderate, high, very_high, extreme]
          example: high
        uv_index_mean:
          type: number
          nullable: true
          description: Mean UV index
          example: 6.5
        temperature_mean:
          type: number
          description: Mean temperature (°C)
          example: 22.8
        humidity_mean:
          type: number
          description: Mean relative humidity (%)
          example: 56.6
        precipitation_mean:
          type: number
          description: Mean daily precipitation (mm)
          example: 0.6
        wind_speed_mean:
          type: number
          description: Mean wind speed (km/h)
          example: 13.3

    # ── Score responses ───────────────────────

    ProcessResponse:
      allOf:
        - type: object
          properties:
            country_code:
              type: string
              example: AUS
        - $ref: "#/components/schemas/ScoreFields"

    ScoreResponse:
      allOf:
        - type: object
          properties:
            country_code:
              type: string
              example: AUS
            country:
              type: string
              example: Australia
            capital:
              type: string
              nullable: true
              example: Canberra
            latitude:
              type: number
              example: -35.2835
            longitude:
              type: number
              example: 149.1281
            processed_at:
              type: string
              format: date-time
              example: "2026-03-01T10:00:00.000Z"
        - $ref: "#/components/schemas/ScoreFields"

    CompareItem:
      oneOf:
        - allOf:
            - type: object
              properties:
                country_code:
                  type: string
                  example: AUS
                country:
                  type: string
                  example: Australia
                capital:
                  type: string
                  nullable: true
                  example: Canberra
            - $ref: "#/components/schemas/ScoreFields"
        - type: object
          description: Returned when no data exists for a country_code
          properties:
            country_code:
              type: string
              example: JPN
            error:
              type: string
              example: No data found

    RankingItem:
      allOf:
        - type: object
          properties:
            country_code:
              type: string
              example: AUS
            country:
              type: string
              example: Australia
            capital:
              type: string
              nullable: true
              example: Canberra
            latitude:
              type: number
              example: -35.2835
            longitude:
              type: number
              example: 149.1281
        - $ref: "#/components/schemas/ScoreFields"

    SeasonalResponse:
      type: object
      properties:
        country_code:
          type: string
          example: AUS
        country:
          type: string
          example: Australia
        capital:
          type: string
          nullable: true
          example: Canberra
        seasonal:
          type: object
          properties:
            spring:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/ScoreFields"
            summer:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/ScoreFields"
            autumn:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/ScoreFields"
            winter:
              nullable: true
              allOf:
                - $ref: "#/components/schemas/ScoreFields"

    MonthlyEntry:
      type: object
      properties:
        month:
          type: string
          enum: [Jan, Feb, Mar, Apr, May, Jun, Jul, Aug, Sep, Oct, Nov, Dec]
          example: Jan
        temp:
          type: number
          nullable: true
          example: 26.1
        humidity:
          type: number
          nullable: true
          example: 48.5
        precipitation:
          type: number
          nullable: true
          example: 0.4
        wind:
          type: number
          nullable: true
          example: 11.2
        uv:
          type: number
          nullable: true
          example: 11.8

    MonthlyResponse:
      type: object
      properties:
        country_code:
          type: string
          example: AUS
        country:
          type: string
          example: Australia
        capital:
          type: string
          nullable: true
          example: Canberra
        monthly:
          type: array
          minItems: 12
          maxItems: 12
          items:
            $ref: "#/components/schemas/MonthlyEntry"

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Must provide a country_code